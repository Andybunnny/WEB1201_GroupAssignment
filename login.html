<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Granbakery</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <div class="header-nav-wrapper" id="mainHeader">
        <header>
            <img src="assets/img/granbakery_header_final.png" height="90" alt="Granbakery Logo">
        </header>

        <nav>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="catalogue.html">Catalogue</a></li>
                <li><a href="reviews.html">Reviews</a></li>
                <li><a href="team.html">Our Team</a></li>
            </ul>
            <div class="nav-icons">
                <button class="theme-toggle" aria-label="Toggle theme"></button>
                <a href="login.html" aria-label="Go to login page">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="1.5" fill="none"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                </a>
            </div>
        </nav>
    </div>
    <main>
        <div class="auth-container id="authFormContainer id="authFormContainer">
            <div class="form-step active-step">
                <h2>Log in to Granbakery</h2>
                
                <form id="loginForm" onsubmit="event.preventDefault();">
                    <input type="text" id="loginEmail" placeholder="Email address or mobile number" required>
                    <input type="password" id="loginPassword" placeholder="Password" required>
                    <button type="submit">Log in</button>
                </form>
                
                <a href="#" class="forgot-password">Forgotten password?</a>
                
                <hr>
                
                <button onclick="window.location.href='signup.html'" class="create-account-btn">Create new account</button>
            </div>
        </div>
        <div id="loggedInState" class="logged-in-container" style="display: none; text-align: center; padding: 4rem 2rem;">
            <h2>Welcome back, <span id="welcomeName" style="color: var(--accent, #8b5a2b);"></span>!</h2>
            <p style="color: var(--text-secondary, #666); margin: 1rem 0 2rem;">You are currently signed into your Granbakery account.</p>
            
            <button id="logoutBtn" style="background-color: #a67c52; color: #fff; border: none; padding: 12px 24px; border-radius: 4px; font-size: 1rem; cursor: pointer; font-weight: bold; width: 100%; max-width: 250px; margin: 0 auto; transition: background-color 0.3s;">
                Log Out
            </button>
        </div>
    </main>

    <footer>
        <p>Copyright 2026 &copy; Granbakery Sdn Bhd</p>
    </footer>

    <script src="js/global.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
