<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Granbakery</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <header>
        <img src="assets/img/granbakery_header_final.png" height="90" alt="Granbakery Logo">
    </header>

    <nav>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="">Order Now</a></li>
            <li><a href="cookies.html">Catalogue</a></li>
            <li><a href="people.html">Our Team</a></li>
        </ul>
        <div class="nav-icons">
            <button class="theme-toggle" aria-label="Toggle theme"></button>
            <a href="login.html" aria-label="Go to login page">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="1.5" fill="none"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            </a>
            <a href="#" aria-label="Shopping cart">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="1.5" fill="none"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
            </a>
        </div>
    </nav>

    <main>
        <div class="auth-container">
            <div class="form-step active-step">
                <h2>Log in to Granbakery</h2>
                
                <form id="loginForm" onsubmit="event.preventDefault();">
                    <input type="text" id="loginEmail" placeholder="Email address or mobile number" required>
                    <input type="password" id="loginPassword" placeholder="Password" required>
                    <button type="submit">Log in</button>
                </form>
                
                <a href="#" class="forgot-password">Forgotten password?</a>
                
                <hr>
                
                <button onclick="window.location.href='signup.html'" class="create-account-btn">Create new account</button>
            </div>
        </div>
    </main>

    <footer>
        <p>Copyright 2026 &copy; Granbakery Sdn Bhd</p>
    </footer>

    <script src="js/global.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
