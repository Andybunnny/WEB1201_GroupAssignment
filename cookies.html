<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<title>Cookies - Granbakery</title>
		<link rel="stylesheet" href="css/variables.css">
		<link rel="stylesheet" href="css/styles.css">
		<link rel="stylesheet" href="css/cookies.css">
	</head>
	<body>
		<header>
			<button class="theme-toggle" aria-label="Toggle theme"></button>
			<img src="assets/img/granbakery_header_final.png" height="90">
		</header>

		<nav>
			<ul>
				<li>Home</li>
				<li>About</li>
				<li>Order Now</li>
				<li>Catalogue</li>
				<li>Our Team</li>
			</ul>
		</nav>

		<main>
			<section>
				<h2>Freshly Baked Cookies</h2>
			</section>
			<section id="controls" aria-label="Catalogue Controls" class="controls-container">
				<input type="text" id="searchInput" placeholder="Search cookies..." aria-label="Search cookies">

				<select id="categoryFilter" aria-label="Filter by category">
					<option value="all">All Categories</option>
					<option value="classic">Classic</option>
					<option value="premium">Premium Delights</option>
					<option value="healthy">Guilt-Free / Healthy</option>
				</select>

				<select id="priceSort" aria-label="Sort by price">
					<option value="none">Sort By Price</option>
					<option value="low-high">Price: Low to High</option>
					<option value="high-low">Price: High to Low</option>
				</select>
			</section>

			<section id="catalogueGrid" class="product-grid" aria-live="polite">
				<!-- Cookie cards will be injected here by JavaScript -->
			</section>

			<script src="js/global.js"></script>
			<script src="js/catalogue.js"></script>
		</main>

		<footer>
			<p>Copyright 2026 &copy; Granbakery Sdn Bhd</p>
		</footer>
	</body>
</html>
