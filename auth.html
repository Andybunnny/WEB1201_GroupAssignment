<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bakery Login & Registration</title>
    <!-- Remember: No inline styles permitted, link your external CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <main class="auth-container">
        
        <!-- Login Simulation Section -->
        <section id="login-section">
            <h2>Welcome Back</h2>
            <form id="login-form">
                <label for="login-email">Email:</label>
                <input type="email" id="login-email" required>
                
                <label for="login-password">Password:</label>
                <input type="password" id="login-password" required minlength="6">
                
                <button type="submit">Login</button>
            </form>
            <div id="login-greeting" class="hidden"></div>
        </section>

        <hr>

        <!-- Multi-Step Registration Section -->
        <section id="register-section">
            <h2>Create a Bakery Account</h2>
            
            <!-- Progress Indicator -->
            <div class="progress-indicator">
                <span class="step active">1. Account</span>
                <span class="step">2. Details</span>
                <span class="step">3. Preferences</span>
            </div>

            <form id="register-form">
                <!-- Step 1: Account -->
                <div class="form-step active-step" id="step-1">
                    <h3>Account Setup</h3>
                    <label for="reg-email">Email Address:</label>
                    <input type="email" id="reg-email" required>
                    
                    <label for="reg-password">Password:</label>
                    <input type="password" id="reg-password" required minlength="8">
                    
                    <button type="button" class="next-btn">Next Step</button>
                </div>

                <!-- Step 2: Personal Details -->
                <div class="form-step" id="step-2">
                    <h3>Personal Details</h3>
                    <label for="reg-name">Full Name:</label>
                    <input type="text" id="reg-name" required>
                    
                    <label for="reg-phone">Phone Number:</label>
                    <!-- Basic regex for phone validation -->
                    <input type="tel" id="reg-phone" pattern="[0-9]{10,11}" title="Enter a valid 10-11 digit phone number" required>
                    
                    <button type="button" class="prev-btn">Previous</button>
                    <button type="button" class="next-btn">Next Step</button>
                </div>

                <!-- Step 3: Bakery Preferences -->
                <div class="form-step" id="step-3">
                    <h3>Bakery Preferences</h3>
                    <label for="reg-fav">Favorite Treat:</label>
                    <select id="reg-fav" required>
                        <option value="">Select an option...</option>
                        <option value="cakes">Custom Cakes</option>
                        <option value="cookies">Cookies & Pastries</option>
                        <option value="bread">Artisanal Breads</option>
                    </select>
                    
                    <button type="button" class="prev-btn">Previous</button>
                    <button type="submit">Complete Registration</button>
                </div>
            </form>
        </section>

    </main>

    <!-- Pure JavaScript logic -->
    <script src="js/auth-logic.js"></script>
</body>
</html>
