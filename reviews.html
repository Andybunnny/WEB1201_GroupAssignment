<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<title>Reviews - Granbakery</title>
		<link rel="stylesheet" href="css/variables.css">
		<link rel="stylesheet" href="css/styles.css">
		<link rel="stylesheet" href="css/reviews.css">
	</head>
	<body>

        <div class="header-nav-wrapper" id="mainHeader">
            <header>
                <img src="assets/img/granbakery_header_final.png" height="90" alt="Granbakery Logo">
            </header>

            <nav>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="">Order Now</a></li>
                    <li><a href="cookies.html">Catalogue</a></li>
                    <li><a href="reviews.html">Reviews</a></li>
                    <li><a href="team.html">Our Team</a></li>
                </ul>
                <div class="nav-icons">
                    <button class="theme-toggle" aria-label="Toggle theme"></button>
                    <a href="login.html" aria-label="Go to login page">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="1.5" fill="none"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    </a>
                    <a href="#" aria-label="Shopping cart">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="1.5" fill="none"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
                    </a>
                </div>
            </nav>
        </div>

		<main>
            <!-- ===== REVIEW MODULE ===== -->
            <section class="reviews-section">
                <div class="reviews-header">
                    <h2>Rate Your Experience</h2>
                    <p>We love to hear what you think about Granbakery!</p>
                </div>

                <div class="review-form-container">
                    <form id="reviewForm">
                        <!-- Star Rating Input -->
                        <div class="star-rating" id="starRatingContainer">
                            <span class="star" data-value="1">&#9733;</span>
                            <span class="star" data-value="2">&#9733;</span>
                            <span class="star" data-value="3">&#9733;</span>
                            <span class="star" data-value="4">&#9733;</span>
                            <span class="star" data-value="5">&#9733;</span>
                        </div>
                        <p id="ratingError" class="error-msg" style="display: none;">Please select a star rating.</p>

                        <!-- Text Review Input -->
                        <div class="textarea-group">
                            <textarea id="reviewText" placeholder="Tell us about your favorite treats..." maxlength="200" required></textarea>
                            <!-- Real-time Character Count -->
                            <div class="char-count"><span id="currentCharCount">0</span> / 200 characters</div>
                        </div>

                        <!-- Anonymous Toggle -->
                        <div class="anonymous-toggle">
                            <input type="checkbox" id="anonCheck">
                            <label for="anonCheck">Submit anonymously</label>
                        </div>

                        <button type="submit" class="submit-btn">Submit Review</button>
                    </form>
                </div>

                <!-- Dynamic Reviews Display Area -->
                <div class="reviews-display" id="reviewsGrid">
                    <!-- Reviews will be injected here by JavaScript -->
                </div>
            </section>
        </main>
		<footer>
			<p>Copyright 2026 &copy; Granbakery Sdn Bhd</p>
		</footer>
        
        <!-- Scripts -->
        <script src="js/global.js"></script> 
        <script src="js/reviews.js"></script>
	</body>
</html>
