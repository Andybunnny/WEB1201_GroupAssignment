<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<title>Checkout - Granbakery</title>
		<link rel="stylesheet" href="css/variables.css">
		<link rel="stylesheet" href="css/styles.css">
        <style>
            /* Specific styles for the full-page checkout container */
            .checkout-container {
                max-width: 800px;
                margin: 2rem auto;
                background: var(--bg-card);
                padding: 3rem;
                border-radius: var(--radius);
                box-shadow: var(--shadow-soft);
            }

            .checkout-container h2 {
                text-align: center;
                margin-bottom: 2.5rem;
                color: var(--accent);
                font-weight: 300;
                letter-spacing: 0.05em;
            }

            .checkout-table-headers {
                display: flex;
                font-size: 0.85rem;
                color: var(--text-secondary);
                text-transform: uppercase;
                border-bottom: 1px solid var(--border);
                padding-bottom: 1rem;
                margin-bottom: 1rem;
            }

            .checkout-action {
                margin-top: 3rem;
                text-align: right;
                border-top: 1px solid var(--border);
                padding-top: 2rem;
            }

            .checkout-action .checkout-btn {
                width: auto;
                padding: 14px 40px;
                font-size: 1.1rem;
            }
        </style>
	</head>
	<body>
		<div class="header-nav-wrapper" id="mainHeader">
			<header>
				<img src="assets/img/granbakery_header_final.png" height="90" alt="Granbakery Logo">
			</header>

			<nav>
				<ul class="nav-links">
					<li><a href="index.html">Home</a></li>
					<li><a href="about.html">About</a></li>
					<li><a href="">Order Now</a></li>
					<li><a href="cookies.html">Catalogue</a></li>
					<li><a href="reviews.html">Reviews</a></li>
					<li><a href="team.html">Our Team</a></li>
				</ul>
				<div class="nav-icons">
					<button class="theme-toggle" aria-label="Toggle theme"></button>
					<a href="login.html" aria-label="Go to login page">
						<svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="1.5" fill="none"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
					</a>
					<a href="#" aria-label="Shopping cart" onclick="toggleCart(); return false;">
						<svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="1.5" fill="none"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
					</a>
				</div>
			</nav>
		</div>

		<main>
			<div class="checkout-container">
                <h2>Review Your Order</h2>
                
                <div class="checkout-table-headers" id="tableHeaders">
                    <div class="col-product">Product</div>
                    <div class="col-qty" style="text-align: center;">Quantity</div>
                    <div class="col-total" style="text-align: right;">Total</div>
                </div>

                <!-- global.js automatically looks for this ID and injects the cart items here! -->
                <div id="cartItems"></div>
                
                <div class="checkout-action">
                    <!-- global.js automatically injects the final total here! -->
                    <div id="cartTotal" class="slide-cart-total" style="font-size: 1.5rem; margin-bottom: 1.5rem;"></div>
                    
                    <button class="checkout-btn" id="checkoutBtn" onclick="processCheckout()">Confirm & Pay</button>
                    <p id="orderMessage" style="color: var(--accent); font-weight: 500; font-size: 1.2rem; margin-top: 1rem; display: none;"></p>
                </div>
            </div>
		</main>

		<footer>
			<p>Copyright 2026 &copy; Granbakery Sdn Bhd</p>
		</footer>

        <!-- Slide-out Cart (Included here so the navbar cart icon still functions perfectly on this page) -->
        <div id="slideOutCart" class="slide-out-cart">
            <div class="cart-header">
                <h2>Your Cart</h2>
                <button class="close-cart-btn" onclick="toggleCart()">✕</button>
            </div>
            <div class="table-headers">
                <div class="col-product">Product</div>
                <div class="col-qty">Quantity</div>
                <div class="col-total">Total</div>
            </div>
            <div id="slideCartItems" class="slide-cart-items"></div>
            <div class="cart-footer">
                <div id="slideCartTotal" class="slide-cart-total">Total: RM 0.00</div>
                <button class="checkout-btn" onclick="toggleCart()">Keep Shopping</button>
            </div>
        </div>

        <script src="js/global.js"></script>
        
        <!-- Local script to handle the final checkout button press -->
        <script>
            function processCheckout() {
                // Check if cart is already empty
                if (!cart || cart.length === 0) return;

                // 1. Wipe the local storage
                localStorage.removeItem("cart");
                cart = []; // Reset global cart array
                
                // 2. Hide the UI elements
                document.getElementById("cartItems").innerHTML = "";
                document.getElementById("cartTotal").innerHTML = "";
                document.getElementById("tableHeaders").style.display = "none";
                document.getElementById("checkoutBtn").style.display = "none";
                
                // 3. Display the success message
                const msg = document.getElementById("orderMessage");
                msg.style.display = "block";
                msg.innerHTML = "Order placed successfully! 🍪<br><span style='font-size: 1rem; color: var(--text-secondary); font-weight: normal;'>Thank you for supporting Granbakery.</span>";
                
                // 4. Force the slide-out cart bubble to update back to 0
                updateCartCount();
                showCart();
            }
        </script>
	</body>
</html>
